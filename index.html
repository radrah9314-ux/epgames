<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <link rel='stylesheet' href='style.css'>
</head>

<body>
    <header>
        <h2 class="Logo">Epgames</h2>
        <nav class="navigation">
            <a href="preview.html">Home</a>
            <a href="preview.html">About us</a>
            <a href="preview.html">Services</a>
            <a href="preview.html">Contact</a>
            <a href="preview.html">Languages</a>
            <a href="preview.html">account</a>
            <button class="btnLogin-popup">Login</button>

            <div class="profile-menu" style="display: none;">
                <button class="btn-profile">My Profile</button>
                <div class="profile-dropdown">
                    <a href="#">My Profile</a>
                    <a href="#" id="logout">Logout</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="wrapper">
        <span class="icon-close">
            <ion-icon name="close"></ion-icon>
        </span>
        <div class="form-box login">
            <h2>Login</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <div id="g_id_onload"
     data-client_id="177160045050-cgpr4vjt6frni9f9pr3hu2b7s8geuij7.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-theme="outline"
     data-size="large">
</div>
                <button type="submit" class="btn">Login
                </button>
                
                <div class="login-register">
                    <p>Don't have an account? <a href="#" class="Register-link">Register</a></p>
                </div>
            </form>
        </div>
        
        <span class="icon-close"><ion-icon name="close"></ion-icon></span>

        <div class="form-box register">
            <h2>Registration</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="person"></ion-icon></span>
                    <input type="text" required>
                    <label>Username</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox"> I Agree to the terms & conditions</label>
                </div>
                <div id="g_id_onload"
     data-client_id="177160045050-cgpr4vjt6frni9f9pr3hu2b7s8geuij7.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-theme="outline"
     data-size="large">
</div>
                <button type="submit" class="btn">Register
                </button>
                <div class="login-register">
                    <p>Already have an account? <a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>
    </div>

    
    <script src="script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>

</html>
